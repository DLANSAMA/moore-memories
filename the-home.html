<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>The Home | Tiny Home That Sleeps 6 · Moore Memories</title>
  <meta name="description" content="Open-concept tiny home with a rear queen bedroom, a loft with two queens, a full bath with walk-in shower, washer/dryer, central A/C, and a covered deck." />
  <meta name="author" content="Dylan Reed" />
  <meta name="theme-color" content="#103833" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="canonical" href="https://moorememories.com/the-home.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Moore Memories" />
  <meta property="og:url" content="https://moorememories.com/the-home.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://moorememories.com/assets/exterior.jpg" />
  <meta property="og:title" content="The Home · Moore Memories tiny home, sleeps 6" />
  <meta property="og:description" content="Room by room through a bright, modern tiny home at Ocean Lakes." />
  <meta property="og:image" content="https://moorememories.com/assets/exterior.jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/tw.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/site.css" />
</head>
<body class="font-sans text-ink">

  <!-- ===== PAGE HERO ===== -->
  <section class="pagehero relative overflow-hidden">
    <img src="assets/listing/MainFloor.jpg" alt="" class="pagehero-img absolute inset-0 w-full h-full object-cover" />
    <div class="absolute inset-0 bg-pine-deep/70"></div>
    <div class="relative max-w-7xl mx-auto px-5 sm:px-8 pt-28 sm:pt-36 pb-12 sm:pb-14 text-white">
      <p class="eyebrow text-brass-light mb-5">The Home</p>
      <h1 class="font-display text-4xl sm:text-6xl font-medium tracking-[-.01em]">The tiny home, room by room</h1>
      <p class="mt-5 max-w-2xl text-sand/90 leading-relaxed" id="intro"></p>
    </div>
  </section>

  <!-- ===== LAYOUT AT A GLANCE ===== -->
  <section class="max-w-7xl mx-auto px-5 sm:px-8 py-16 lg:py-20">
    <div class="reveal grid lg:grid-cols-3 gap-10 items-start">
      <div class="lg:col-span-1">
        <p class="eyebrow text-brass-dark mb-5">At a glance</p>
        <h2 class="font-display text-3xl sm:text-4xl font-medium text-pine tracking-[-.01em]">Layout at a glance</h2>
        <div class="hairline w-24 my-6"></div>
        <div class="flex flex-col sm:flex-row flex-wrap gap-3">
          <a href="gallery.html" class="btn-pine px-6 py-3 text-sm w-full sm:w-auto text-center">View the gallery</a>
          <a href="rates.html#book" class="btn-brass px-6 py-3 text-sm w-full sm:w-auto text-center">Check Availability</a>
        </div>
      </div>
      <ul class="lg:col-span-2 grid sm:grid-cols-2 gap-x-10 gap-y-3" id="layout"></ul>
    </div>
  </section>

  <!-- ===== ROOMS ===== -->
  <section class="bg-cream border-b border-sand-deep py-14 sm:py-20 lg:py-24">
    <div class="max-w-7xl mx-auto px-5 sm:px-8 space-y-16 lg:space-y-24" id="rooms"></div>
  </section>

  <!-- ===== AMENITIES ===== -->
  <section class="max-w-7xl mx-auto px-5 sm:px-8 pt-10 pb-16 sm:py-24 lg:py-28">
    <div class="reveal text-center max-w-2xl mx-auto mb-14">
      <p class="eyebrow center text-brass-dark mb-5">Amenities</p>
      <h2 class="font-display text-3xl sm:text-5xl font-medium text-pine tracking-[-.01em]">Everything that's inside</h2>
    </div>
    <div id="amenities" class="grid md:grid-cols-2 lg:grid-cols-3 gap-x-10 gap-y-10"></div>
  </section>

  <!-- ===== CTA ===== -->
  <section class="bg-pine text-sand">
    <div class="max-w-4xl mx-auto px-6 py-16 text-center">
      <h2 class="font-display text-3xl sm:text-4xl font-medium text-white">See it for yourself</h2>
      <p class="mt-4 text-sand/85">Browse all 36 photos, or send us your dates.</p>
      <div class="mt-7 flex flex-wrap gap-4 justify-center">
        <a href="gallery.html" class="btn-ghost px-7 py-3.5 text-sm">View all photos</a>
        <a href="rates.html#book" class="btn-brass px-7 py-3.5 text-sm tracking-wide">Check Availability</a>
      </div>
    </div>
  </section>

  <script src="assets/data.js"></script>
  <script>
    const ck = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="text-brass shrink-0 mt-0.5"><path d="M20 6L9 17l-5-5"/></svg>';
    document.getElementById('intro').textContent = TP.rooms ? TP_intro() : '';
    function TP_intro(){ return "Welcome to Moore Memories, a bright, modern tiny home tucked into Site 1669 inside the gates of Ocean Lakes. The open-concept layout, vaulted ceilings, and walls of windows make it feel airy and wide open — with a queen bedroom plus a loft holding two more queens, it comfortably sleeps up to six."; }

    document.getElementById('layout').innerHTML = TP.layout.map(l =>
      `<li class="flex items-start gap-3 text-ink/80">${ck}<span>${l}</span></li>`).join('');

    document.getElementById('rooms').innerHTML = TP.rooms.map((r,i) =>
      `<div class="reveal grid lg:grid-cols-2 gap-10 lg:gap-16 items-center">
        <div class="imgzoom rounded-2xl shadow-sm ${i%2?'lg:order-2':''}" data-lb data-full="${r.img}" data-cap="${r.room}"><img src="${r.img}" alt="${r.room}" class="object-cover w-full h-72 lg:h-96" /></div>
        <div class="${i%2?'lg:order-1':''}">
          <p class="eyebrow text-brass-dark mb-4">${String(i+1).padStart(2,'0')}</p>
          <h3 class="font-display text-3xl sm:text-4xl font-medium text-pine tracking-[-.01em]">${r.room}</h3>
          <p class="mt-5 text-ink/75 leading-[1.75] max-w-[58ch]">${r.blurb}</p>
          <ul class="mt-6 grid sm:grid-cols-2 gap-x-8 gap-y-2.5">${r.highlights.map(h=>`<li class="flex items-start gap-2.5 text-sm text-ink/80">${ck}<span>${h}</span></li>`).join('')}</ul>
        </div>
      </div>`).join('');

    document.getElementById('amenities').innerHTML = TP.amenityGroups.map(g =>
      `<div class="reveal">
        <p class="text-[11px] uppercase tracking-[.2em] text-brass-dark font-semibold mb-4 pb-3 border-b border-sand-deep">${g.category}</p>
        <ul class="space-y-3">${g.items.map(it=>`<li class="flex items-start gap-3">${ck}<span class="flex-1 leading-relaxed"><span class="text-pine font-medium">${it[0]}</span>${it[1]?` <span class="text-ink/50 text-sm">— ${it[1]}</span>`:''}</span></li>`).join('')}</ul>
      </div>`).join('');
  </script>
  <script src="assets/site.js"></script>
</body>
</html>
