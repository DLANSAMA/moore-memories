<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Photo Gallery | Moore Memories Tiny Home, Ocean Lakes</title>
  <meta name="description" content="See inside Moore Memories: vaulted living space, queen bedroom, two-queen loft, walk-in shower bath, covered porch, and the resort's private Atlantic beach." />
  <meta name="author" content="Dylan Reed" />
  <meta name="theme-color" content="#103833" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="canonical" href="https://moorememories.com/gallery.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Moore Memories" />
  <meta property="og:url" content="https://moorememories.com/gallery.html" />
  <meta property="og:description" content="See inside the tiny home and the Ocean Lakes resort around it." />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://moorememories.com/assets/exterior.jpg" />
  <meta property="og:title" content="Gallery · Moore Memories tiny home" />
  <meta property="og:image" content="https://moorememories.com/assets/exterior.jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/tw.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/site.css" />
</head>
<body class="font-sans text-ink">

  <section class="pagehero">
    <div class="max-w-7xl mx-auto px-5 sm:px-8 pt-28 sm:pt-36 pb-12 sm:pb-14">
      <p class="eyebrow text-brass-light mb-5">Gallery</p>
      <h1 class="font-display text-4xl sm:text-6xl font-medium text-white tracking-[-.01em]">Every angle of the home</h1>
      <p class="mt-5 max-w-2xl text-sand/80 leading-relaxed">All 36 photos of the tiny home and the Ocean Lakes resort around it. Tap any photo to view it full-screen.</p>
    </div>
  </section>

  <section class="max-w-7xl mx-auto px-5 sm:px-8 py-12 lg:py-16">
    <div id="filters" class="chip-fade flex flex-nowrap sm:flex-wrap overflow-x-auto no-scrollbar gap-2.5 mb-8 -mx-5 px-5 sm:mx-0 sm:px-0"></div>
    <div id="grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4"></div>
    <p class="text-sm text-ink/55 italic mt-8 text-center">Photos of the actual property — Site 1669, Ocean Lakes.</p>
  </section>

  <section class="bg-pine text-sand">
    <div class="max-w-4xl mx-auto px-6 py-16 text-center">
      <h2 class="font-display text-3xl sm:text-4xl font-medium text-white">Like what you see?</h2>
      <p class="mt-4 text-sand/85">Send us your dates and we'll confirm availability.</p>
      <a href="rates.html#book" class="btn-brass px-7 py-3.5 mt-7 text-sm tracking-wide">Check Availability</a>
    </div>
  </section>

  <script src="assets/data.js"></script>
  <script>
    const cats = TP.galleryCats;
    // Filter chips
    const chips = [{key:'all',label:'All Photos'}].concat(cats.map(c => ({key:c.name, label:c.name})));
    document.getElementById('filters').innerHTML = chips.map((c,i) =>
      `<button class="filter-chip${i===0?' active':''}" data-filter="${c.key}">${c.label}</button>`).join('');
    // Tiles (all photos, in category order)
    const RM = { Outside:'Exterior', Porch:'Covered porch & deck', Living:'Living area', MainFloor:'Open main floor', Kitchen:'Kitchen', Master:'Primary bedroom', Loft:'Sleeping loft (two queens)', Bathroom:'Bathroom', Laundry:'Laundry' };
    const labelFor = f => { const b=f.replace('.jpg',''); if (/^\d+$/.test(b)) return Number(b) >= 32 ? 'Aerial over Ocean Lakes' : 'The tiny home exterior'; if (b.includes('Aerial')) return 'Aerial over Ocean Lakes'; let l = RM[b.split('_')[0]] || b.split('_')[0]; if (b.includes('Night')) l += ' at dusk'; return l; };
    let tiles = '';
    cats.forEach(c => c.files.forEach(s => {
      const src = `assets/listing/${s}`, label = labelFor(s), alt = `${label} — Moore Memories tiny home, Site 1669 Ocean Lakes`;
      tiles += `<button class="imgzoom rounded-xl overflow-hidden h-48 sm:h-56" data-cat="${c.name}" data-lb data-full="${src}" data-cap="${label}"><img src="${src}" alt="${alt}" loading="lazy" class="object-cover w-full h-full" /></button>`;
    }));
    document.getElementById('grid').innerHTML = tiles;
    // Filtering
    document.getElementById('filters').addEventListener('click', e => {
      const b = e.target.closest('.filter-chip'); if(!b) return;
      document.querySelectorAll('.filter-chip').forEach(x=>x.classList.toggle('active', x===b));
      const f = b.dataset.filter;
      document.querySelectorAll('#grid [data-cat]').forEach(t => { t.style.display = (f==='all'||t.dataset.cat===f) ? '' : 'none'; });
    });
  </script>
  <script src="assets/site.js"></script>
</body>
</html>
